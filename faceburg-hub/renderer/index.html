<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faceburg App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark">F</div>
        <div class="brand-copy">
          <strong>Faceburg App</strong>
          <span id="server-label">http://localhost:3000</span>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="btn-system-back" class="btn btn-ghost" type="button">Voltar</button>
        <button id="btn-system-forward" class="btn btn-ghost" type="button">Avancar</button>
        <button id="btn-config-server" class="btn btn-ghost" type="button">Servidor</button>
        <button id="btn-system-home" class="btn btn-ghost" type="button">Sistema</button>
        <button id="btn-system-reload" class="btn btn-ghost" type="button">Atualizar</button>
        <button id="btn-open-window" class="btn btn-ghost" type="button">Abrir em janela</button>
        <button id="btn-whats-toggle" class="btn btn-whatsapp" type="button">Abrir WhatsApp</button>
      </div>
    </header>

    <section class="status-bar">
      <span id="whats-status-chip" class="status-chip status-chip-off">WhatsApp desligado</span>
      <span id="runtime-status" class="runtime-status">Entre no sistema normalmente nesta janela. Quando quiser, clique em Abrir WhatsApp.</span>
    </section>

    <main class="browser-area">
      <webview
        id="system-webview"
        class="system-webview"
        partition="persist:faceburg-system"
        allowpopups
      ></webview>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
